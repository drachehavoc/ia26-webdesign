<!DOCTYPE html>
<html>

<head>
  <title>hack css</title>
  <style>
    #toggle {
      display: none;
    }

    #toggle:checked~aside {
      transform: translateX(0%);
    }

    aside {
      background-color: lightcoral;
      position: fixed;
      left: 0;
      top: 0;
      width: 200px;
      height: 100vh;
      transform: translateX(-100%);
      transition: .3s;
    }
  </style>
</head>

<body>

  <input type="checkbox" id="toggle">
  <span>asjkdgasjd</span>
  <aside>
    goiaba
    <label for="toggle">textoqualquer</label>
  </aside>
  <p>lorem</p>
  <p>lorem</p>
  <p>lorem</p>
  <p>lorem</p>
  <p>lorem</p>
  <label for="toggle">textoqualquer</label>
</body>

</html>
